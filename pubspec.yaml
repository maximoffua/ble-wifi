name: sandbox
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
version: 1.0.0+1

environment:
  sdk: '>=3.1.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  isar: ^4.0.0-dev.14
  isar_flutter_libs: ^4.0.0-dev.14
  get_it: ^7.6.4
  auto_route: ^7.8.4
  talker_flutter: ^3.5.6
  flutter_riverpod: ^3.0.0-dev.3
  riverpod_annotation: ^3.0.0-dev.3
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  wifi_iot: ^0.3.18+1
  flutter_blue_plus: ^1.30.7
  google_sign_in: ^6.1.6
  supabase_flutter:
    path: ../grovero/supabase-flutter/packages/supabase_flutter
  hive: ^4.0.0-dev.2
  introduction_screen: ^3.1.12
  url_launcher: ^6.2.2
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2
  table_calendar: ^3.0.9
  wifi_scan: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  build_runner: any
  auto_route_generator: ^7.3.2
  custom_lint: ^0.5.7
  riverpod_lint: ^3.0.0-dev.4
  riverpod_generator: ^3.0.0-dev.11
  flutter_gen_runner: ^5.3.2
#  isar_generator: ^3.1.0+1


flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
